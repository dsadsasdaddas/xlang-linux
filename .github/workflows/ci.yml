name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  coreutils:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout xlang-linux
        uses: actions/checkout@v4

      - name: Clone xlang compiler
        run: git clone --depth 1 https://github.com/dsadsasdaddas/xlang /tmp/xlang

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build xlangc
        run: cargo build --release
        working-directory: /tmp/xlang

      - name: Compile every coreutil (.x -> C -> executable)
        run: |
          set -e
          XLANGC=/tmp/xlang/target/release/xlangc
          mkdir -p build bin
          pass=0
          for f in coreutils/*.x; do
            stem=$(basename "$f" .x)
            "$XLANGC" c "$f"
            cc -O2 -o "bin/$stem" "build/$stem.c"
            pass=$((pass + 1))
          done
          echo "::notice::compiled $pass coreutils (.x -> C -> executable) OK"

      - name: Cross-check coreutils vs GNU (correctness regression)
        run: |
          bash bench/coreutils_xcheck.sh "$PWD/bin"
          echo "::notice::coreutils cross-check vs GNU passed"

      - name: Stress (no crash regression)
        run: |
          set -e
          # sort -n on 30k lines of non-numeric text (all sort as value 0) must
          # NOT crash. Regression: the old last-pivot quicksort stack-overflowed
          # (O(n) recursion depth) on all-equal input.
          seq 1 30000 | sed 's/^/x/' | ./bin/sort -n >/dev/null
          echo "::notice::stress (sort -n no-crash on 30k all-equal) passed"

      # Run the per-tool functional suites (bench/*_test.sh). These validate the
      # upgraded tools (grep -r/-i, find -name, ls -l, wc multi-file, diff, dd,
      # timeout, xsh if/else/case/comments) by cross-checking vs GNU on Linux —
      # regression coverage that previously only ran manually on the dev box.
      - name: Tool functional suites (bench/*_test.sh)
        run: |
          XL=/tmp/xlang/target/release/xlangc
          fail=0
          for t in grep find ls wc diff dd timeout xsh head tail sed cat mkdir mv rm calc xargs strings sort tr uniq cut tee nl comm paste expr expand unexpand text_tools split_tsort seq stat od chmod ln_du touch env_base64 misc_tools mktemp install; do
            if bash "bench/${t}_test.sh" "$XL" >/tmp/ft.out 2>&1; then
              echo "PASS  ${t}_test.sh"
            else
              echo "FAIL  ${t}_test.sh"; tail -8 /tmp/ft.out; fail=1
            fi
          done
          if [ $fail -eq 0 ]; then echo "::notice::tool functional suites passed"; fi
          exit $fail

      # Pure-xlang userland pipeline integration: run multi-stage pipelines using
      # ONLY xlang coreutils (from bin/), comparing to GNU equivalents.
      - name: Pipeline integration test (pure-xlang userland)
        run: |
          bash bench/pipeline_test.sh "$PWD/bin"

      # Comprehensive integration test: realistic multi-tool pipelines (find+grep+wc,
      # cat+sort+uniq, ls+grep, xargs, sed+tr) on a project tree.
      - name: Comprehensive integration test (realistic pipelines)
        run: |
          bash bench/integration_test.sh "$PWD/bin"

      # Range-for codegen benchmark + cross-repo integration test: a Sieve of
      # Eratosthenes built with the new `for i in a..b` loops (from xlang main),
      # checked for correct prime counts and timed against hand-written C.
      - name: Range-for benchmark (sieve vs hand-written C)
        run: |
          bash bench/range_bench.sh /tmp/xlang/target/release/xlangc

      # Based-literal + bitwise + inclusive-range benchmark: a popcount kernel
      # dogfooding 0x literals, & / >>, and `..=` loops, timed vs hand-written C.
      - name: Bitcount benchmark (popcount vs hand-written C)
        run: |
          bash bench/bitcount_bench.sh /tmp/xlang/target/release/xlangc

      # String `+` performance contract: `s = s + chunk` in a loop is O(n²)
      # (fresh alloc per +) vs the sb_push builder at amortized O(n).
      - name: Concat benchmark (`+`-in-loop vs sb_push builder)
        run: |
          bash bench/concat_bench.sh /tmp/xlang/target/release/xlangc

      # String comparison (`< ==`, → strcmp) benchmark: selection sort vs the
      # same algorithm in C, proving zero codegen overhead.
      - name: String-sort benchmark (strcmp comparison vs C)
        run: |
          bash bench/strsort_bench.sh /tmp/xlang/target/release/xlangc

      # Method-call benchmark: sum length_sq() over N points via `impl` methods,
      # vs the same as a C free function (what a method mangles to).
      - name: Method-call benchmark (impl methods vs C)
        run: |
          bash bench/method_bench.sh /tmp/xlang/target/release/xlangc
