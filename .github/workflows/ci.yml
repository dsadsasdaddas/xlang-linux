name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  coreutils:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout xlang-linux
        uses: actions/checkout@v4

      - name: Clone xlang compiler
        run: git clone --depth 1 https://github.com/dsadsasdaddas/xlang /tmp/xlang

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build xlangc
        run: cargo build --release
        working-directory: /tmp/xlang

      - name: Compile every coreutil (.x -> C -> executable)
        run: |
          set -e
          XLANGC=/tmp/xlang/target/release/xlangc
          mkdir -p build bin
          pass=0
          for f in coreutils/*.x; do
            stem=$(basename "$f" .x)
            "$XLANGC" c "$f"
            cc -O2 -o "bin/$stem" "build/$stem.c"
            pass=$((pass + 1))
          done
          echo "::notice::compiled $pass coreutils (.x -> C -> executable) OK"

      - name: Cross-check coreutils vs GNU (correctness regression)
        run: |
          bash bench/coreutils_xcheck.sh "$PWD/bin"
          echo "::notice::coreutils cross-check vs GNU passed"

      - name: Stress (no crash / no O(n²) regression)
        run: |
          set -e
          # sort -n on non-numeric text must not crash (regression: old quicksort
          # stack-overflowed on all-equal input) and must stay fast.
          seq 1 20000 | sed 's/^/line-/' | ./bin/sort -n | head -1 | grep -q '^line-1$'
          # sort on already-sorted input must be fast (regression: O(n²) on sorted).
          seq 1 20000 | ./bin/sort | tail -1 | grep -q '^20000$'
          echo "::notice::stress checks passed"
